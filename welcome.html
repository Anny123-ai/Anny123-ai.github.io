<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到李艺的学习空间 ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .floating-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: float 6s ease-in-out infinite;
        }

        .shape-1 {
            width: 200px;
            height: 200px;
            background: #fff;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 150px;
            height: 150px;
            background: #ffd93d;
            top: 60%;
            right: 10%;
            animation-delay: 1s;
        }

        .shape-3 {
            width: 100px;
            height: 100px;
            background: #6bcb77;
            bottom: 20%;
            left: 20%;
            animation-delay: 2s;
        }

        .shape-4 {
            width: 120px;
            height: 120px;
            background: #ff6b6b;
            top: 30%;
            right: 20%;
            animation-delay: 3s;
        }

        .shape-5 {
            width: 80px;
            height: 80px;
            background: #4ecdc4;
            bottom: 30%;
            right: 30%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(10deg);
            }
        }

        /* 星星装饰 */
        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            font-size: 24px;
            animation: twinkle 2s ease-in-out infinite;
        }

        .star:nth-child(1) { top: 15%; left: 8%; animation-delay: 0s; }
        .star:nth-child(2) { top: 25%; right: 12%; animation-delay: 0.3s; }
        .star:nth-child(3) { bottom: 35%; left: 15%; animation-delay: 0.6s; }
        .star:nth-child(4) { top: 45%; right: 8%; animation-delay: 0.9s; }
        .star:nth-child(5) { bottom: 20%; right: 20%; animation-delay: 1.2s; }
        .star:nth-child(6) { top: 10%; left: 30%; animation-delay: 0.2s; }
        .star:nth-child(7) { bottom: 15%; left: 40%; animation-delay: 0.5s; }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 主容器 */
        .welcome-container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
            max-width: 600px;
            width: 90%;
        }

        /* 头像区域 - 用可爱的emoji代替 */
        .avatar-section {
            margin-bottom: 30px;
            animation: bounceIn 1s ease-out;
        }

        .cute-avatar {
            font-size: 100px;
            display: inline-block;
            animation: wave 2s ease-in-out infinite;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .cute-avatar:hover {
            transform: scale(1.1);
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(15deg); }
            75% { transform: rotate(-15deg); }
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3);
            }
            50% {
                transform: scale(1.05);
            }
            70% {
                transform: scale(0.9);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 标题 */
        .welcome-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            margin-bottom: 15px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            animation: slideDown 0.8s ease-out 0.3s both;
        }

        .welcome-title span {
            display: inline-block;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 副标题 */
        .welcome-subtitle {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.9);
            margin-bottom: 20px;
            line-height: 1.8;
            animation: slideDown 0.8s ease-out 0.5s both;
        }

        .welcome-subtitle .highlight {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin: 5px;
        }

        /* 打字机效果 */
        .typewriter {
            overflow: hidden;
            border-right: 3px solid white;
            white-space: nowrap;
            animation: typing 3s steps(30, end), blink-caret 0.75s step-end infinite;
            display: inline-block;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: white }
        }

        /* 介绍卡片 */
        .intro-card {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 30px;
            margin: 25px 0;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            animation: slideUp 0.8s ease-out 0.7s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .intro-card h3 {
            color: #667eea;
            font-size: 1.3rem;
            margin-bottom: 15px;
        }

        .intro-info {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .info-tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: default;
        }

        .info-tag:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .info-tag.emoji {
            font-size: 1.1rem;
        }

        /* 按钮 */
        .start-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #ffd93d 0%, #ff6b6b 100%);
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            padding: 18px 50px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 8px 30px rgba(255, 107, 107, 0.4);
            transition: all 0.3s ease;
            animation: slideUp 0.8s ease-out 0.9s both, pulse-btn 2s ease-in-out infinite 1.7s;
            position: relative;
            overflow: hidden;
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .start-btn:hover::before {
            left: 100%;
        }

        .start-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.5);
        }

        .start-btn:active {
            transform: translateY(-2px) scale(1.02);
        }

        @keyframes pulse-btn {
            0%, 100% {
                box-shadow: 0 8px 30px rgba(255, 107, 107, 0.4);
            }
            50% {
                box-shadow: 0 8px 50px rgba(255, 107, 107, 0.6);
            }
        }

        .btn-icon {
            font-size: 1.5rem;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(5px); }
        }

        /* 小装饰 */
        .decoration {
            position: absolute;
            font-size: 30px;
            opacity: 0.8;
        }

        .deco-1 { top: -20px; left: -30px; animation: spin 10s linear infinite; }
        .deco-2 { bottom: -20px; right: -30px; animation: spin 10s linear infinite reverse; }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 底部提示 */
        .footer-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            animation: fadeInUp 1s ease-out 1.5s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translate(-50%, 20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        .footer-hint .arrow {
            display: inline-block;
            animation: bounce-up 1s ease-in-out infinite;
        }

        @keyframes bounce-up {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* 进度条 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin-loader 1s linear infinite;
        }

        @keyframes spin-loader {
            to { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .welcome-title {
                font-size: 1.8rem;
            }
            
            .welcome-subtitle {
                font-size: 1rem;
            }
            
            .cute-avatar {
                font-size: 80px;
            }
            
            .intro-card {
                padding: 20px;
            }
            
            .start-btn {
                font-size: 1.1rem;
                padding: 15px 40px;
            }

            .floating-shape {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 加载动画 -->
    <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>
        <div class="floating-shape shape-4"></div>
        <div class="floating-shape shape-5"></div>
    </div>

    <!-- 星星装饰 -->
    <div class="stars">
        <span class="star">✨</span>
        <span class="star">⭐</span>
        <span class="star">🌟</span>
        <span class="star">💫</span>
        <span class="star">⭐</span>
        <span class="star">✨</span>
        <span class="star">🌟</span>
    </div>

    <!-- 主内容 -->
    <div class="welcome-container">
        <!-- 头像区 - 可爱的emoji -->
        <div class="avatar-section">
            <span class="cute-avatar" onclick="changeEmoji(this)">👩‍💻</span>
        </div>

        <!-- 标题 -->
        <h1 class="welcome-title">
            <span>🌈</span> 欢迎来到李艺的学习空间 <span>🌈</span>
        </h1>

        <!-- 副标题 -->
        <p class="welcome-subtitle">
            <span class="highlight">✨ Python学习之旅 ✨</span>
            <br>
            一起探索数据分析的奇妙世界吧~
        </p>

        <!-- 介绍卡片 -->
        <div class="intro-card">
            <h3>🌸 关于我 🌸</h3>
            <div class="intro-info">
                <span class="info-tag emoji">📚</span>
                <span class="info-tag">广东科学技术职业学院</span>
                <span class="info-tag">商务数据分析</span>
                <span class="info-tag emoji">🏸</span>
                <span class="info-tag emoji">🎵</span>
                <span class="info-tag emoji">📺</span>
            </div>
        </div>

        <!-- 开始按钮 -->
        <a href="main.html" class="start-btn" id="startBtn">
            <span class="btn-icon">🚀</span>
            <span>开始学习</span>
        </a>
    </div>

    <!-- 底部提示 -->
    <div class="footer-hint">
        <span class="arrow">👇</span> 点击上方按钮进入学习空间
    </div>

    <script>
        // 页面加载完成后隐藏加载动画
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loading').classList.add('hidden');
            }, 500);
        });

        // 点击头像更换表情
        const emojis = ['👩‍💻', '👩‍🎓', '👩‍🏫', '🤓', '💁‍♀️', '🙋‍♀️', '👩‍💼', '🎀'];
        let currentEmoji = 0;
        
        function changeEmoji(element) {
            currentEmoji = (currentEmoji + 1) % emojis.length;
            element.textContent = emojis[currentEmoji];
            
            // 添加点击动画
            element.style.transform = 'scale(1.3) rotate(10deg)';
            setTimeout(() => {
                element.style.transform = 'scale(1)';
            }, 200);
        }

        // 按钮鼠标跟随效果
        const btn = document.getElementById('startBtn');
        btn.addEventListener('mouseenter', function() {
            this.querySelector('.btn-icon').textContent = '💫';
        });
        btn.addEventListener('mouseleave', function() {
            this.querySelector('.btn-icon').textContent = '🚀';
        });

        // 添加点击涟漪效果
        btn.addEventListener('click', function(e) {
            const ripple = document.createElement('span');
            ripple.style.cssText = `
                position: absolute;
                width: 20px;
                height: 20px;
                background: rgba(255,255,255,0.5);
                border-radius: 50%;
                transform: scale(0);
                animation: ripple 0.6s linear;
                pointer-events: none;
            `;
            
            const rect = this.getBoundingClientRect();
            ripple.style.left = (e.clientX - rect.left) + 'px';
            ripple.style.top = (e.clientY - rect.top) + 'px';
            
            this.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });

        // 添加涟漪动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: scale(20);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // 随机星星闪烁
        setInterval(() => {
            const stars = document.querySelectorAll('.star');
            const randomStar = stars[Math.floor(Math.random() * stars.length)];
            randomStar.style.transform = 'scale(1.5)';
            randomStar.style.opacity = '1';
            setTimeout(() => {
                randomStar.style.transform = 'scale(1)';
                randomStar.style.opacity = '';
            }, 300);
        }, 2000);
    </script>
</body>
</html>
