<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 李艺的音乐空间</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            padding: 30px;
            position: relative;
            overflow-x: hidden;
        }

        .bg-decoration {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .music-note {
            position: absolute;
            font-size: 30px;
            animation: float-music 4s ease-in-out infinite;
            opacity: 0.6;
        }

        .note-1 { top: 10%; left: 5%; animation-delay: 0s; }
        .note-2 { top: 20%; right: 10%; animation-delay: 0.5s; }
        .note-3 { top: 40%; left: 15%; animation-delay: 1s; }
        .note-4 { top: 60%; right: 15%; animation-delay: 1.5s; }
        .note-5 { bottom: 30%; left: 20%; animation-delay: 2s; }
        .note-6 { bottom: 20%; right: 25%; animation-delay: 2.5s; }
        .note-7 { top: 30%; left: 80%; animation-delay: 0.3s; }
        .note-8 { bottom: 40%; right: 10%; animation-delay: 1.8s; }

        @keyframes float-music {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            font-size: 20px;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-size: 2.5rem;
            color: #e74c3c;
            font-weight: 800;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header p {
            font-size: 1.1rem;
            color: #666;
            background: rgba(255,255,255,0.8);
            padding: 10px 30px;
            border-radius: 25px;
            display: inline-block;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .music-grid {
            display: grid;
            gap: 25px;
        }

        .music-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease-out backwards;
            position: relative;
        }

        .music-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .music-card:nth-child(1) { animation-delay: 0.1s; }
        .music-card:nth-child(2) { animation-delay: 0.2s; }
        .music-card:nth-child(3) { animation-delay: 0.3s; }
        .music-card:nth-child(4) { animation-delay: 0.4s; }
        .music-card:nth-child(5) { animation-delay: 0.5s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 音乐插件样式 */
        .music-plugin {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            min-width: 70px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .plugin-icon {
            font-size: 1.8rem;
            animation: bounce-icon 1s ease-in-out infinite;
        }

        @keyframes bounce-icon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .plugin-bars {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 20px;
        }

        .plugin-bars .bar {
            width: 5px;
            background: white;
            border-radius: 2px;
            animation: equalizer 0.8s ease-in-out infinite;
        }

        .plugin-bars .bar:nth-child(1) { height: 8px; animation-delay: 0s; }
        .plugin-bars .bar:nth-child(2) { height: 15px; animation-delay: 0.1s; }
        .plugin-bars .bar:nth-child(3) { height: 20px; animation-delay: 0.2s; }
        .plugin-bars .bar:nth-child(4) { height: 12px; animation-delay: 0.3s; }
        .plugin-bars .bar:nth-child(5) { height: 6px; animation-delay: 0.4s; }

        @keyframes equalizer {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1); }
        }

        .music-card:hover .plugin-bars .bar {
            animation-duration: 0.5s;
        }

        .music-card:hover .plugin-icon {
            animation: spin-icon 1s ease-in-out infinite;
        }

        @keyframes spin-icon {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg); }
            75% { transform: rotate(15deg); }
        }

        .cover-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        .cover-img {
            width: 100px;
            height: 100px;
            border-radius: 15px;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }

        .music-card:hover .cover-img {
            transform: scale(1.1);
        }

        .music-info {
            flex: 1;
            min-width: 0;
        }

        .music-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-artist {
            font-size: 0.95rem;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
            font-size: 0.85rem;
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
            padding: 4px 12px;
            border-radius: 15px;
        }

        .music-card:hover .music-tag {
            background: rgba(231, 76, 60, 0.2);
        }

        .footer-decoration {
            text-align: center;
            margin-top: 40px;
            font-size: 1.5rem;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @media (max-width: 768px) {
            body {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .music-card {
                flex-direction: column;
                text-align: center;
            }

            .music-info {
                width: 100%;
            }

            .cover-img {
                width: 120px;
                height: 120px;
            }

            .music-plugin {
                flex-direction: row;
                width: auto;
                padding: 8px 15px;
            }
        }
    </style>
</head>

    <script>

        setInterval(() => {
