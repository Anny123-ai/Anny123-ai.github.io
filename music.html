<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 李艺的音乐空间</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            padding: 30px;
            padding-bottom: 120px;
            position: relative;
            overflow-x: hidden;
        }

        .bg-decoration {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .music-note {
            position: absolute;
            font-size: 30px;
            animation: float-music 4s ease-in-out infinite;
            opacity: 0.6;
        }

        .note-1 { top: 10%; left: 5%; animation-delay: 0s; }
        .note-2 { top: 20%; right: 10%; animation-delay: 0.5s; }
        .note-3 { top: 40%; left: 15%; animation-delay: 1s; }
        .note-4 { top: 60%; right: 15%; animation-delay: 1.5s; }
        .note-5 { bottom: 30%; left: 20%; animation-delay: 2s; }
        .note-6 { bottom: 20%; right: 25%; animation-delay: 2.5s; }
        .note-7 { top: 30%; left: 80%; animation-delay: 0.3s; }
        .note-8 { bottom: 40%; right: 10%; animation-delay: 1.8s; }

        @keyframes float-music {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            font-size: 20px;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-size: 2.5rem;
            color: #e74c3c;
            font-weight: 800;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header p {
            font-size: 1.1rem;
            color: #666;
            background: rgba(255,255,255,0.8);
            padding: 10px 30px;
            border-radius: 25px;
            display: inline-block;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .music-grid {
            display: grid;
            gap: 25px;
        }

        .music-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease-out backwards;
            cursor: pointer;
            position: relative;
        }

        .music-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .music-card:nth-child(1) { animation-delay: 0.1s; }
        .music-card:nth-child(2) { animation-delay: 0.2s; }
        .music-card:nth-child(3) { animation-delay: 0.3s; }
        .music-card:nth-child(4) { animation-delay: 0.4s; }
        .music-card:nth-child(5) { animation-delay: 0.5s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .music-card.playing {
            background: linear-gradient(135deg, #fff5f5 0%, #ffe0e0 100%);
            border: 2px solid #e74c3c;
        }

        .cover-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        .cover-img {
            width: 100px;
            height: 100px;
            border-radius: 15px;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }

        .music-card:hover .cover-img {
            transform: scale(1.1);
        }

        .music-card.playing .cover-img {
            animation: cover-rotate 10s linear infinite;
        }

        @keyframes cover-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: rgba(231, 76, 60, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .play-overlay:hover {
            transform: translate(-50%, -50%) scale(1.15);
            background: #e74c3c;
        }

        .play-icon {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 12px 0 12px 20px;
            border-color: transparent transparent transparent white;
            margin-left: 5px;
        }

        .pause-icon {
            display: flex;
            gap: 5px;
        }

        .pause-icon span {
            width: 6px;
            height: 20px;
            background: white;
            border-radius: 2px;
        }

        .music-info {
            flex: 1;
            min-width: 0;
        }

        .music-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-artist {
            font-size: 0.95rem;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-platform {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
            font-size: 0.85rem;
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
            padding: 4px 12px;
            border-radius: 15px;
        }

        .progress-container {
            width: 100%;
            margin-top: 10px;
        }

        .progress-bar {
            height: 6px;
            background: #eee;
            border-radius: 3px;
            overflow: hidden;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e74c3c, #f39c12);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #999;
            margin-top: 5px;
        }

        .footer-decoration {
            text-align: center;
            margin-top: 40px;
            font-size: 1.5rem;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 全局播放器 */
        .global-player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 30px;
            display: none;
            align-items: center;
            gap: 20px;
            box-shadow: 0 -5px 30px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        .global-player.active {
            display: flex;
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-title {
            color: white;
            font-weight: 700;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-artist {
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .control-btn:hover {
            transform: scale(1.2);
        }

        .play-pause-btn {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .play-pause-btn:hover {
            transform: scale(1.1);
        }

        .play-pause-btn .play-icon {
            border-width: 12px 0 12px 18px;
            border-color: transparent transparent transparent #667eea;
        }

        .play-pause-btn .pause-icon {
            gap: 4px;
        }

        .play-pause-btn .pause-icon span {
            width: 5px;
            height: 18px;
            background: #667eea;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
        }

        .volume-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
        }

        .loading-indicator {
            color: white;
            font-size: 0.9rem;
            display: none;
        }

        .loading-indicator.active {
            display: block;
        }

        @media (max-width: 768px) {
            body {
                padding: 20px;
                padding-bottom: 100px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .music-card {
                flex-direction: column;
                text-align: center;
            }

            .music-info {
                width: 100%;
            }

            .cover-img {
                width: 120px;
                height: 120px;
            }

            .global-player {
                padding: 10px 15px;
                flex-wrap: wrap;
            }

            .volume-control {
                display: none;
            }
        }
    </style>
</head>

    <script>
        // 音乐数据（使用可靠的示例音频源）
        const musicList = [
            {
                title: "零距离的思念",
                artist: "vine",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
            },
            {
                title: "Gotta Have You",
                artist: "The Weepies",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
            },
            {
                title: "一半一半",
                artist: "Top Barry",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
            },
            {
                title: "幻痛药 Hurt And Hurt",
                artist: "Tlatre特雷西",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"
            },
            {
                title: "春",
                artist: "陈文非",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3"
            }
        ];

        const audio = document.getElementById('audio-player');
        const globalPlayer = document.getElementById('globalPlayer');
        const playerTitle = document.getElementById('playerTitle');
        const playerArtist = document.getElementById('playerArtist');
        const loadingIndicator = document.getElementById('loadingIndicator');
        
        let currentIndex = -1;
        let isPlaying = false;

        // 显示/隐藏全局播放器
        function showGlobalPlayer() {
            globalPlayer.classList.add('active');
        }

        // 更新全局播放器信息
        function updateGlobalPlayer() {
            if (currentIndex >= 0) {
                const music = musicList[currentIndex];
                playerTitle.textContent = music.title;
                playerArtist.textContent = music.artist;
            }
        }

        // 切换播放/暂停
        function togglePlay(index) {
            const cards = document.querySelectorAll('.music-card');
            
            if (currentIndex === index) {
                if (isPlaying) {
                    audio.pause();
                    cards[index].classList.remove('playing');
                    updatePlayButton(false);
                    isPlaying = false;
                } else {
                    audio.play();
                    cards[index].classList.add('playing');
                    updatePlayButton(true);
                    isPlaying = true;
                }
            } else {
                // 切换到新的歌曲
                if (currentIndex !== -1) {
                    cards[currentIndex].classList.remove('playing');
                }
                
                currentIndex = index;
                const music = musicList[index];
                
                showGlobalPlayer();
                updateGlobalPlayer();
                
                loadingIndicator.classList.add('active');
                audio.src = music.url;
                
                audio.play().then(() => {
                    cards[index].classList.add('playing');
                    updatePlayButton(true);
                    isPlaying = true;
                    loadingIndicator.classList.remove('active');
                }).catch(err => {
                    console.error('播放失败:', err);
                    loadingIndicator.classList.remove('active');
                    alert('音频加载失败，请稍后重试');
                });
            }
        }

        // 全局播放/暂停
        function toggleGlobalPlay() {
            if (currentIndex === -1) return;
            
            if (isPlaying) {
                audio.pause();
                updatePlayButton(false);
                isPlaying = false;
                document.querySelectorAll('.music-card')[currentIndex].classList.remove('playing');
            } else {
                audio.play();
                updatePlayButton(true);
                isPlaying = true;
                document.querySelectorAll('.music-card')[currentIndex].classList.add('playing');
            }
        }

        // 更新播放按钮状态
        function updatePlayButton(playing) {
            const playIcon = document.getElementById('globalPlayIcon');
            const pauseIcon = document.getElementById('globalPauseIcon');
            
            if (playing) {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'flex';
            } else {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        }

        // 上一首
        function prevMusic() {
            if (currentIndex <= 0) {
                togglePlay(musicList.length - 1);
            } else {
                togglePlay(currentIndex - 1);
            }
        }

        // 下一首
        function nextMusic() {
            if (currentIndex >= musicList.length - 1) {
                togglePlay(0);
            } else {
                togglePlay(currentIndex + 1);
            }
        }

        // 设置音量
        function setVolume(value) {
            audio.volume = value / 100;
        }

        // 更新进度条
        audio.addEventListener('timeupdate', function() {
            const cards = document.querySelectorAll('.music-card');
            if (currentIndex >= 0 && currentIndex < cards.length) {
                const card = cards[currentIndex];
                const progress = (audio.currentTime / audio.duration) * 100;
                const progressFill = card.querySelector('.progress-fill');
                const currentTimeEl = card.querySelector('.current-time');
                const durationEl = card.querySelector('.duration');
                
                if (progressFill) progressFill.style.width = progress + '%';
                if (currentTimeEl) currentTimeEl.textContent = formatTime(audio.currentTime);
                if (durationEl) durationEl.textContent = '-' + formatTime(audio.duration - audio.currentTime);
            }
        });

        // 格式化时间
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // 歌曲结束
        audio.addEventListener('ended', function() {
            const cards = document.querySelectorAll('.music-card');
            if (currentIndex >= 0 && currentIndex < cards.length) {
                cards[currentIndex].classList.remove('playing');
            }
            updatePlayButton(false);
            isPlaying = false;
            
            // 自动播放下一首
            nextMusic();
        });

        // 跳转播放
        function seekMusic(event, index) {
            const cards = document.querySelectorAll('.music-card');
            const card = cards[index];
            const progressBar = card.querySelector('.progress-bar');
            const rect = progressBar.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            
            if (currentIndex === index && audio.duration) {
                audio.currentTime = percent * audio.duration;
            } else {
                currentIndex = index;
                const music = musicList[index];
                
                showGlobalPlayer();
                updateGlobalPlayer();
                
                audio.src = music.url;
                audio.currentTime = percent * audio.duration;
                
                audio.play().then(() => {
                    cards[index].classList.add('playing');
                    updatePlayButton(true);
                    isPlaying = true;
                }).catch(err => {
                    console.error('播放失败:', err);
                });
            }
        }

        // 音频加载错误处理
        audio.addEventListener('error', function(e) {
            console.error('音频加载错误:', e);
            loadingIndicator.classList.remove('active');
            alert('音频加载失败，请检查网络连接后重试');
        });

        // 随机音符飘动
        setInterval(() => {
            const notes = document.querySelectorAll('.music-note');
            const randomNote = notes[Math.floor(Math.random() * notes.length)];
            randomNote.style.transform = `translateY(${Math.random() * 20 - 10}px) rotate(${Math.random() * 20 - 10}deg)`;
        }, 3000);

        // 设置初始音量
        audio.volume = 0.8;
    </script>
</body>
</html>
