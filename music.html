<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 李艺的音乐空间</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            padding: 30px;
            position: relative;
            overflow-x: hidden;
        }

        .bg-decoration {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .music-note {
            position: absolute;
            font-size: 30px;
            animation: float-music 4s ease-in-out infinite;
            opacity: 0.6;
        }

        .note-1 { top: 10%; left: 5%; animation-delay: 0s; }
        .note-2 { top: 20%; right: 10%; animation-delay: 0.5s; }
        .note-3 { top: 40%; left: 15%; animation-delay: 1s; }
        .note-4 { top: 60%; right: 15%; animation-delay: 1.5s; }
        .note-5 { bottom: 30%; left: 20%; animation-delay: 2s; }
        .note-6 { bottom: 20%; right: 25%; animation-delay: 2.5s; }
        .note-7 { top: 30%; left: 80%; animation-delay: 0.3s; }
        .note-8 { bottom: 40%; right: 10%; animation-delay: 1.8s; }

        @keyframes float-music {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            font-size: 20px;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-size: 2.5rem;
            color: #e74c3c;
            font-weight: 800;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header p {
            font-size: 1.1rem;
            color: #666;
            background: rgba(255,255,255,0.8);
            padding: 10px 30px;
            border-radius: 25px;
            display: inline-block;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .music-grid {
            display: grid;
            gap: 20px;
        }

        .empty-message {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            animation: fadeInUp 0.6s ease-out;
        }

        .empty-icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .empty-message p {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 8px;
        }

        .empty-hint {
            font-size: 0.95rem !important;
            color: #999 !important;
            font-style: italic;
        }

        .music-card {
            background: white;
            border-radius: 20px;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease-out backwards;
            position: relative;
        }

        .music-card:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 12px 35px rgba(0,0,0,0.12);
        }

        .music-card.playing {
            background: linear-gradient(135deg, #fff5f5 0%, #ffe0e0 100%);
            border: 2px solid #e74c3c;
        }

        .music-card:nth-child(1) { animation-delay: 0.1s; }
        .music-card:nth-child(2) { animation-delay: 0.2s; }
        .music-card:nth-child(3) { animation-delay: 0.3s; }
        .music-card:nth-child(4) { animation-delay: 0.4s; }
        .music-card:nth-child(5) { animation-delay: 0.5s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 音乐插件样式 */
        .music-plugin {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            min-width: 70px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
            transition: all 0.3s ease;
        }

        .plugin-icon {
            font-size: 1.8rem;
            animation: bounce-icon 1s ease-in-out infinite;
        }

        @keyframes bounce-icon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .plugin-bars {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 20px;
        }

        .plugin-bars .bar {
            width: 5px;
            background: white;
            border-radius: 2px;
            animation: equalizer 0.8s ease-in-out infinite;
        }

        .plugin-bars .bar:nth-child(1) { height: 8px; animation-delay: 0s; }
        .plugin-bars .bar:nth-child(2) { height: 15px; animation-delay: 0.1s; }
        .plugin-bars .bar:nth-child(3) { height: 20px; animation-delay: 0.2s; }
        .plugin-bars .bar:nth-child(4) { height: 12px; animation-delay: 0.3s; }
        .plugin-bars .bar:nth-child(5) { height: 6px; animation-delay: 0.4s; }

        @keyframes equalizer {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1); }
        }

        .music-card:hover .plugin-bars .bar {
            animation-duration: 0.5s;
        }

        .music-card:hover .plugin-icon {
            animation: spin-icon 1s ease-in-out infinite;
        }

        @keyframes spin-icon {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg); }
            75% { transform: rotate(15deg); }
        }

        /* 暂停按钮 */
        .pause-btn {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #e74c3c 0%, #f39c12 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
            z-index: 10;
        }

        .pause-btn .pause-icon {
            display: flex;
            gap: 5px;
        }

        .pause-btn .pause-icon span {
            width: 6px;
            height: 18px;
            background: white;
            border-radius: 2px;
        }

        .music-card:hover .pause-btn,
        .music-card.playing .pause-btn {
            opacity: 1;
        }

        .pause-btn:hover {
            transform: translateY(-50%) scale(1.15);
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.5);
        }

        /* 播放中状态 */
        .music-card.playing .plugin-icon {
            animation: spin-icon-playing 1s linear infinite;
        }

        @keyframes spin-icon-playing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .music-card.playing .plugin-bars .bar {
            animation-duration: 0.3s;
        }

        /* 进度条样式 */
        .progress-section {
            flex: 1;
            min-width: 0;
        }

        .music-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .music-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-artist {
            font-size: 1rem;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-container {
            margin-top: 5px;
        }

        .progress-bar {
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e74c3c, #f39c12);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .progress-bar:hover .progress-fill {
            background: linear-gradient(90deg, #c0392b, #e74c3c);
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #999;
            margin-top: 4px;
        }

        .music-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
            padding: 4px 12px;
            border-radius: 15px;
            margin-top: 5px;
        }

        .footer-decoration {
            text-align: center;
            margin-top: 40px;
            font-size: 1.5rem;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @media (max-width: 768px) {
            body {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .music-card {
                flex-direction: column;
                text-align: center;
                padding-right: 25px;
            }

            .music-info {
                width: 100%;
            }

            .music-plugin {
                flex-direction: row;
                width: auto;
                padding: 8px 15px;
            }

            .pause-btn {
                position: static;
                transform: none;
                margin-top: 10px;
            }

            .pause-btn:hover {
                transform: scale(1.15);
            }
        }
    </style>
</head>
<body>
    <div class="bg-decoration">
        <span class="music-note note-1">🎵</span>
        <span class="music-note note-2">🎶</span>
        <span class="music-note note-3">🎵</span>
        <span class="music-note note-4">🎶</span>
        <span class="music-note note-5">🎵</span>
        <span class="music-note note-6">🎶</span>
        <span class="music-note note-7">🎵</span>
        <span class="music-note note-8">🎶</span>
    </div>

    <div class="stars">
        <span class="star" style="top: 15%; left: 10%;">⭐</span>
        <span class="star" style="top: 25%; right: 15%; animation-delay: 0.3s;">✨</span>
        <span class="star" style="bottom: 40%; left: 20%; animation-delay: 0.6s;">⭐</span>
        <span class="star" style="top: 50%; right: 10%; animation-delay: 0.9s;">🌟</span>
        <span class="star" style="bottom: 25%; right: 20%; animation-delay: 1.2s;">⭐</span>
        <span class="star" style="top: 35%; left: 75%; animation-delay: 0.5s;">✨</span>
    </div>

    <div class="container">
        <a href="main.html" class="back-btn">
            <span>←</span>
            <span>返回主页</span>
        </a>

        <div class="header">
            <h1>🎵 我的音乐歌单 🎵</h1>
            <p>音乐是心灵的调味剂~</p>
        </div>

        <div class="empty-message">
            <span class="empty-icon">🎧</span>
            <p>暂时还没有添加歌曲</p>
            <p class="empty-hint">期待李艺的音乐收藏~</p>
        </div>

        <div class="footer-decoration">
            🎵 🎶 🎵 🎶 🎵
        </div>
    </div>
</body>
</html>
